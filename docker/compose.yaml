services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    hostname: kafka
    ports:
      - "29092:29092"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  mlflow:
    image: python:3.10-slim
    container_name: mlflow
    working_dir: /app
    command: >
      bash -c "pip install mlflow &&
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /app/mlruns
      --host 0.0.0.0
      --port 5000"
    ports:
      - "5001:5000"
    volumes:
      - ../docker/mlflow_data:/app

  # From upstream (guhankesav): WebSocket → Kafka ingestor
  ingestor:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ingestor
    container_name: ingestor
    working_dir: /app
    depends_on:
      - kafka
    command: ["python", "scripts/ws_ingest.py", "--pair", "BTC-USD", "--minutes", "15", "--bootstrap_servers", "kafka:9092"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: crypto-api
    depends_on:
      - kafka
      - mlflow
    environment:
      MODEL_PATH: "/app/models/artifacts/random_forest_pipeline.pkl"
      APP_VERSION: "v1.2"
      MODEL_NAME: "random_forest"
      MODEL_VARIANT: "${MODEL_VARIANT:-ml}"
      GIT_SHA: "${GIT_SHA:-unknown}"
      BASELINE_CONFIG_PATH: "/app/models/artifacts/baseline_zscore_config.json"
      KAFKA_LAG_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      KAFKA_LAG_GROUP_ID: "crypto-featurizer"
      KAFKA_LAG_TOPIC: "ticks.raw"
    ports:
      - "8000:8000"
    volumes:
      - ..:/app

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    depends_on:
      - api
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus_alerts.yml:/etc/prometheus/prometheus_alerts.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

volumes:
  grafana_data:
  kafka_data:
  prometheus_data:
