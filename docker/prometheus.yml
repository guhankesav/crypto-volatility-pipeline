global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/prometheus_alerts.yml

scrape_configs:
  - job_name: crypto-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - crypto-api:8000

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090
