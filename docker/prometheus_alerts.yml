groups:
  - name: crypto-week6-alerts
    rules:
      - alert: CryptoApiHighP95Latency
        expr: histogram_quantile(0.95, rate(predict_latency_seconds_bucket[5m])) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Crypto API p95 latency is above 800 ms"
          description: "p95 prediction latency has been above 800 ms for at least 5 minutes."

      - alert: CryptoApiHighErrorRate
        expr: rate(predict_errors_total[5m]) / rate(predict_requests_total[5m]) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Crypto API error rate is above 1%"
          description: "Prediction error rate has exceeded 1% over the last 5 minutes."

      - alert: CryptoApiPredictionsStale
        expr: time() - last_prediction_timestamp_seconds > 60
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Crypto API predictions are stale"
          description: "No successful prediction has been recorded for more than 60 seconds."

      - alert: CryptoKafkaHighConsumerLag
        expr: kafka_consumer_lag_messages > 100000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Kafka consumer lag for the monitored featurizer group"
          description: "kafka_consumer_lag_messages has exceeded 100k for 5m (tune threshold to your load)."

      - alert: CryptoKafkaLagPollErrors
        expr: rate(kafka_lag_scrape_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API cannot read Kafka consumer lag"
          description: "Kafka admin/end_offsets errors while computing lag. Check KAFKA_BOOTSTRAP_SERVERS and that the broker is reachable."
