[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E501",   # line too long (handled by line-length)
    "E741",   # ambiguous variable name (l, O, I)
    "W291",   # trailing whitespace
    "W293",   # whitespace before ':'
]
exclude = [
    ".git",
    "__pycache__",
    "venv",
    ".venv",
    "models/artifacts",
    "data",
    "notebooks",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
